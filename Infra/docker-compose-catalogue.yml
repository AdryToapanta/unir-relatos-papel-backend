version: '3.8'

services:
  postgres-catalogue:
    image: postgres:15
    container_name: catalogue-db
    restart: always
    environment:
      POSTGRES_DB: catalogue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - catalogue_data:/var/lib/postgresql/data

volumes:
  catalogue_data: