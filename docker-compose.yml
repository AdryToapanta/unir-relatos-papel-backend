version: "3.9"

services:
  orders-postgres:
    image: postgres:16
    container_name: orders-postgres
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - orders_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  orders_postgres_data:

