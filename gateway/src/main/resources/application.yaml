server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: catalogue-route
              uri: lb://catalogue-service
              predicates:
                - Path=/api/v1/books/**
            - id: orders-route
              uri: lb://orders-service
              predicates:
                - Path=/api/v1/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
