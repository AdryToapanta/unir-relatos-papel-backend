server:
  port: 8090

spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globals:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${ALLOWED_ORIGINS:*}
                allowedHeaders: "*"
                allowedMethods:
                  - POST
                  - GET
                  - PUT
                  - PATCH
                  - DELETE

      routes:
        - id: catalogue
          uri: lb://catalogue-service
          predicates:
            - Path=/api/v1/books/**
          filters:
            - StripPrefix=0

        - id: orders
          uri: lb://orders-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instanceId: ${spring.application.name}:${random.value}
    statusPageUrlPath: ${management.endpoints.web.base-path:/actuator}/health
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      access: unrestricted