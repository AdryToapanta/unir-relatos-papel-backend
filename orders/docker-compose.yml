version: '3.8'

services:
  orders-db:
    image: postgres:15
    container_name: orders-db
    restart: always
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - orders_data:/var/lib/postgresql/data

volumes:
  orders_data: